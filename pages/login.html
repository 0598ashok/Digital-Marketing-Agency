<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal Login | ApexGrowth Agency</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--hero-gradient);
            padding: 24px;
        }
        .login-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
        }
    </style>
</head>
<body class="dark-mode">

    <div class="login-wrap">
        <div class="login-card">
            <div style="text-align:center; margin-bottom:30px;">
                <a href="../index.html" class="logo" style="justify-content:center; margin-bottom:10px;">
                    APEXGROWTH<span class="logo-dot">.</span>
                </a>
                <p style="color:var(--text-muted); font-size:0.9rem;">Sign in to monitor campaign analytics and review pending creative assets.</p>
            </div>

            <!-- Login form redirects directly to client dashboard demo -->
            <form onsubmit="event.preventDefault(); window.location.href='../dashboard/index.html';">
                <div style="display:flex; flex-direction:column; gap:20px; margin-bottom:24px;">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-input" placeholder="e.g. partner@yourbrand.com" required value="partner@yourbrand.com">
                    </div>
                    <div class="form-group">
                        <label>Security Password</label>
                        <input type="password" class="form-input" placeholder="••••••••" required value="password123">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-bottom:12px;">Sign In to Client Portal</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='../dashboard/admin-index.html';" style="width:100%; margin-bottom:16px; border-color:var(--primary); color:var(--text-color);">Sign In as Admin Console</button>
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text-muted);">
                    <a href="#" onclick="alert('Password reset instructions sent to client email.')" style="text-decoration:underline;">Forgot password?</a>
                    <a href="../index.html" style="text-decoration:underline;">Return to Home</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
